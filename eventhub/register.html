<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register - EventHub</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="nav-container">
    <div class="logo">Event<span>Hub</span></div>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <nav>
      <ul id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="register.html" class="active">Register</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="container">
  <h2 class="section-title">Event Registration</h2>
  <p class="section-subtitle">Fill the form below to secure your spot</p>

  <div class="form-container">
    <div class="success-msg" id="successMsg"></div>
    <form id="regForm" onsubmit="return validateForm(event)">
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" placeholder="Your full name">
        <div class="error" id="nameErr"></div>
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="you@example.com">
        <div class="error" id="emailErr"></div>
      </div>
      <div class="form-group">
        <label for="phone">Phone (10-digit Indian mobile) *</label>
        <input type="tel" id="phone" placeholder="9876543210" maxlength="10">
        <div class="error" id="phoneErr"></div>
      </div>
      <div class="form-group">
        <label for="event">Select Event *</label>
        <select id="event">
          <option value="">-- Choose an event --</option>
        </select>
        <div class="error" id="eventErr"></div>
      </div>
      <button type="submit" class="btn" style="width:100%">Submit Registration</button>
    </form>
  </div>
</section>

<footer>&copy; 2025 EventHub. All rights reserved.</footer>
<script src="js/main.js"></script>
<script src="js/register.js"></script>
</body>
</html>
